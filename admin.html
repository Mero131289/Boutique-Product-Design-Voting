<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Choose your favorite design | Anonymous Poll</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="shell">
    <div class="topbar"></div>

    <section class="hero">
      <h1 id="question">Choose your favorite design</h1>
      <p>Anonymous live poll — select one option</p>
    </section>

    <section id="options" class="options-grid" aria-label="Poll options"></section>

    <section class="actions">
      <button id="submitVote" class="primary-btn" disabled>Submit Vote <span aria-hidden="true">→</span></button>
      <div class="helper"><span id="lockIcon"></span> Your vote is anonymous and cannot be changed.</div>
      <div id="message" class="notice hidden"></div>
    </section>
  </main>

  <script src="/app.js"></script>
  <script>
    const { $, getState, connectEvents, icon, optionCard, renderTopbar, makeAnonymousKey } = window.PollApp;
    let state = null;
    let selectedId = null;

    $('#lockIcon').innerHTML = icon('lock');

    function voteStorageKey() {
      return state ? `favorite-design-voted-${state.pollId}` : 'favorite-design-voted';
    }

    function hasVoted() {
      return state && localStorage.getItem(voteStorageKey()) === 'yes';
    }

    function render() {
      if (!state) return;
      renderTopbar(document, state, state.open
        ? `<div class="badge success">${icon('shield')} <span>Anonymous</span></div>`
        : `<div class="badge danger">Voting closed</div>`);
      $('#question').textContent = state.question;
      const options = $('#options');
      options.innerHTML = '';
      state.options.forEach(option => options.appendChild(optionCard(option, selectedId, id => {
        if (!state.open || hasVoted()) return;
        selectedId = id;
        render();
      })));

      const submit = $('#submitVote');
      submit.disabled = !state.open || !selectedId || hasVoted();

      const message = $('#message');
      message.className = 'notice hidden';
      message.textContent = '';
      if (!state.open) {
        message.className = 'notice warn';
        message.textContent = 'Voting is currently closed.';
      } else if (hasVoted()) {
        message.className = 'notice good';
        message.textContent = 'Thank you. Your vote has been counted.';
      }
    }

    async function submitVote() {
      if (!selectedId || !state || hasVoted()) return;
      const submit = $('#submitVote');
      submit.disabled = true;
      submit.textContent = 'Submitting...';
      try {
        const voterKey = makeAnonymousKey(state.pollId);
        const res = await fetch('/api/vote', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ optionId: selectedId, voterKey })
        });
        const payload = await res.json();
        if (!res.ok) throw new Error(payload.error || 'Vote could not be submitted.');
        localStorage.setItem(voteStorageKey(), 'yes');
        state = payload.state;
        render();
      } catch (err) {
        const message = $('#message');
        message.className = 'notice warn';
        message.textContent = err.message;
        submit.disabled = false;
      } finally {
        submit.innerHTML = 'Submit Vote <span aria-hidden="true">→</span>';
      }
    }

    $('#submitVote').addEventListener('click', submitVote);

    getState().then(initial => {
      state = initial;
      render();
      connectEvents(next => { state = next; render(); });
    }).catch(err => {
      $('#message').className = 'notice warn';
      $('#message').textContent = err.message;
    });
  </script>
</body>
</html>
